/* ───────────────────────── progress ring ────────────────────────── */
const ProgressRing = ({ pct, size = 120, stroke = 8, colorIndex }) => {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  const color = colorIndex != null
    ? PROGRESS_COLORS[colorIndex % PROGRESS_COLORS.length]
    : (pct >= 70 ? T.text : pct >= 40 ? T.navy : T.coral);
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.borderLt} strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset .8s ease" }} />
    </svg>
  );
};

/* ───────────────────────── mini progress bar ───────────────────── */
const MiniBar = ({ pct, width = 80, height = 6, colorIndex }) => {
  const color = colorIndex != null
    ? PROGRESS_COLORS[colorIndex % PROGRESS_COLORS.length]
    : (pct >= 70 ? T.text : pct >= 40 ? T.navy : T.coral);
  return (
    <div style={{ width, height, borderRadius: height, background: T.borderLt, overflow: "hidden" }}>
      <div style={{ width: `${pct}%`, height: "100%", borderRadius: height, background: color, transition: "width .6s ease" }} />
    </div>
  );
};

/* ───────────────────────── button ───────────────────────────────── */
const Btn = ({ children, variant = "primary", icon, onClick, small, disabled, style: sx }) => {
  const base = {
    display: "inline-flex", alignItems: "center", gap: 6,
    border: "none", cursor: disabled ? "default" : "pointer",
    borderRadius: 10, fontFamily: "'Nunito Sans', 'Nunito', sans-serif",
    fontWeight: 600, fontSize: small ? 12 : 13,
    padding: small ? "6px 12px" : "10px 18px",
    opacity: disabled ? .5 : 1,
    transition: "all .15s ease",
  };
  const variants = {
    primary:   { background: T.navy, color: "#fff" },
    secondary: { background: T.sand, color: T.text },
    ghost:     { background: "transparent", color: T.navy },
    sage:      { background: T.sage, color: "#fff" },
    coral:     { background: T.coralLt, color: T.coral, border: `1px solid ${T.coral}33` },
    outline:   { background: "transparent", color: T.navy, border: `1.5px solid ${T.navy}33` },
  };
  return (
    <button onClick={onClick} style={{ ...base, ...variants[variant], ...sx }}
      onMouseEnter={e => { if (!disabled) e.target.style.transform = "translateY(-1px)"; }}
      onMouseLeave={e => { e.target.style.transform = "none"; }}>
      {icon}{children}
    </button>
  );
};

                { key: "sharing", label: "Sharing & Access", icon: Icons.contacts },
                { key: "help", label: "Help & Guides", icon: Icons.video },
                { key: "settings", label: "Settings", icon: Icons.settings },
              ].map(tab => (
                <div key={tab.key} onClick={() => setOwnerTab(tab.key)}
                  style={{
                    display: "flex", alignItems: "center", gap: 10,
                    padding: "10px 24px", cursor: "pointer",
                    background: ownerTab === tab.key ? "rgba(255,255,255,.12)" : "transparent",
                    borderRight: ownerTab === tab.key ? "3px solid #DEC07A" : "3px solid transparent",
                    transition: "all .15s"
                  }}
                  onMouseEnter={e => { if (ownerTab !== tab.key) e.currentTarget.style.background = "rgba(255,255,255,.06)"; }}
                  onMouseLeave={e => { if (ownerTab !== tab.key) e.currentTarget.style.background = "transparent"; }}>
                  <tab.icon size={18} color={ownerTab === tab.key ? "#fff" : "rgba(255,255,255,.5)"} />
                  <span style={{ fontFamily: ff, fontSize: 13, fontWeight: ownerTab === tab.key ? 600 : 500, color: ownerTab === tab.key ? "#fff" : "rgba(255,255,255,.65)" }}>
                    {tab.label}
                  </span>
                </div>
              ))}
              <div style={{ borderTop: "1px solid rgba(255,255,255,.12)", margin: "16px 24px" }} />
              <div style={{ padding: "4px 24px 8px" }}>
                <div style={{ fontFamily: ff, fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,.35)", textTransform: "uppercase", letterSpacing: .8, marginBottom: 6 }}>Household</div>
                <div style={{ fontFamily: ffSerif, fontSize: 14, fontWeight: 600, color: "rgba(255,255,255,.8)" }}>The Rivera Family</div>
              </div>
              <div style={{ borderTop: "1px solid rgba(255,255,255,.08)", margin: "12px 24px" }} />
              <div style={{ padding: "8px 24px" }}>
                <Btn small variant="outline" style={{ width: "100%", justifyContent: "center", borderColor: "rgba(255,255,255,.25)", color: "#fff" }}
                  icon={<Icons.check size={14} color="#fff" />}
                  onClick={() => { setWizardStep(0); setShowOnboarding(true); }}>
                  Vault Setup
                </Btn>
              </div>
              <div style={{ flex: 1 }} />
            </>
          ) : view === "trusted" ? (
            <>
              <div style={{ padding: "16px 24px" }}>
                <div style={{
                  padding: "14px 16px", borderRadius: 12, background: "rgba(255,255,255,.1)",
                  border: "1px solid rgba(255,255,255,.15)", marginBottom: 12
                }}>
                  <div style={{ fontFamily: ff, fontSize: 11, fontWeight: 600, color: "#DEC07A", marginBottom: 4 }}>VIEWING AS</div>
                  <div style={{ fontFamily: ff, fontSize: 14, fontWeight: 600, color: "#fff" }}>{TRUSTED_CONTACT_PERSONA.name}</div>
                  <div style={{ fontFamily: ff, fontSize: 12, color: "rgba(255,255,255,.6)" }}>{TRUSTED_CONTACT_PERSONA.role}</div>
                  <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                    {Object.entries(TRUSTED_PERSONAS).map(([key, p]) => (
                      <div key={key} onClick={() => setTrustedPersona(key)} style={{
                        width: 28, height: 28, borderRadius: 14, cursor: "pointer",
                        background: trustedPersona === key ? "#DEC07A" : "rgba(255,255,255,.15)",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontFamily: ff, fontSize: 10, fontWeight: 700,
                        color: trustedPersona === key ? "#fff" : "rgba(255,255,255,.5)",
                        transition: "all .15s"
                      }}>{p.initials}</div>
                    ))}
                  </div>
                </div>
              </div>
              {TRUSTED_CONTACT_PERSONA.sections.map(sec => (
                <div key={sec.key}
                  style={{
                    display: "flex", alignItems: "center", gap: 10,
                    padding: "10px 24px", cursor: "default",
                    background: "rgba(255,255,255,.12)",
                    borderRight: "3px solid #DEC07A",
                  }}>
                  <sec.icon size={18} color="#fff" />
                  <span style={{ fontFamily: ff, fontSize: 13, fontWeight: 500, color: "#fff", whiteSpace: "nowrap" }}>
                    {sec.label}
                  </span>
                </div>
              ))}
              {TRUSTED_CONTACT_PERSONA.restricted.length > 0 && (
                <>
                  <div style={{ borderTop: `1px solid ${T.borderLt}`, margin: "16px 24px" }} />
                  {TRUSTED_CONTACT_PERSONA.restricted.map((name, i) => (
                    <div key={i} style={{
                      display: "flex", alignItems: "center", gap: 8,
                      padding: "6px 24px", opacity: .45
                    }}>
                      <Icons.lock size={14} color="rgba(255,255,255,.4)" />
                      <span style={{ fontFamily: ff, fontSize: 12, color: "rgba(255,255,255,.4)" }}>{name.replace(" Documents", "").replace(" Accounts", "").replace(" Policies", "").replace(" Assets", "")}</span>
                    </div>
                  ))}
                </>
              )}
              <div style={{ borderTop: "1px solid rgba(255,255,255,.12)", margin: "16px 24px" }} />
              <div style={{ padding: "4px 24px 8px" }}>
                <div style={{ fontFamily: ff, fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,.35)", textTransform: "uppercase", letterSpacing: .8, marginBottom: 6 }}>Household</div>
                <div style={{ fontFamily: ffSerif, fontSize: 14, fontWeight: 600, color: "rgba(255,255,255,.8)" }}>The Rivera Family</div>
              </div>
              <div style={{ borderTop: "1px solid rgba(255,255,255,.08)", margin: "12px 24px" }} />
              <div style={{ padding: "8px 24px" }}>
                <Btn small variant="outline" style={{ width: "100%", justifyContent: "center", borderColor: "rgba(255,255,255,.25)", color: "#fff" }}
                  onClick={() => setView("owner")}>
                  ← Back to Owner View
                </Btn>
              </div>
            </>
          ) : (
            <>
              {[
                { key: "clients", label: "Client Dashboard", icon: Icons.bar },
                { key: "settings", label: "Practice Settings", icon: Icons.settings },
              ].map(tab => (
                <div key={tab.key} onClick={() => setAdvisorTab(tab.key)}
                  style={{
                    display: "flex", alignItems: "center", gap: 10,
                    padding: "10px 24px", cursor: "pointer",
                    background: advisorTab === tab.key ? "rgba(255,255,255,.12)" : "transparent",
                    borderRight: advisorTab === tab.key ? "3px solid #DEC07A" : "3px solid transparent",
                    transition: "all .15s"
                  }}
                  onMouseEnter={e => { if (advisorTab !== tab.key) e.currentTarget.style.background = "rgba(255,255,255,.06)"; }}
                  onMouseLeave={e => { if (advisorTab !== tab.key) e.currentTarget.style.background = "transparent"; }}>
                  <tab.icon size={18} color={advisorTab === tab.key ? "#fff" : "rgba(255,255,255,.5)"} />
                  <span style={{ fontFamily: ff, fontSize: 13, fontWeight: advisorTab === tab.key ? 600 : 500, color: advisorTab === tab.key ? "#fff" : "rgba(255,255,255,.65)" }}>
                    {tab.label}
                  </span>
                </div>
              ))}
              <div style={{ borderTop: "1px solid rgba(255,255,255,.12)", margin: "16px 24px" }} />
              <div style={{ padding: "8px 24px" }}>
                <div style={{ fontFamily: ff, fontSize: 10, fontWeight: 600, color: "rgba(255,255,255,.4)", textTransform: "uppercase", letterSpacing: .8, marginBottom: 10 }}>Practice Overview</div>
                <div style={{ fontFamily: ff, fontSize: 12, color: "rgba(255,255,255,.6)", lineHeight: 2 }}>
                  <div>👥 8 active clients</div>
                  <div>📊 57% avg. completion</div>
                  <div>⚡ Professional · 8/50 clients</div>
                  <div>📧 3 pending invitations</div>
                </div>
              </div>
            </>
          )}
        </div>

        {/* Main content */}
        <div style={{ flex: 1, padding: "28px 36px", maxWidth: 1080, overflow: "auto" }}>
          {view === "owner" && ownerTab === "vault" && <VaultDashboard />}
          {view === "owner" && ownerTab === "sharing" && <SharingPanel />}
          {view === "owner" && ownerTab === "help" && <HelpPanel />}
          {view === "owner" && ownerTab === "settings" && <SettingsPanel />}
          {view === "trusted" && <TrustedContactView />}
          {view === "advisor" && advisorTab === "clients" && <AdvisorClients />}
          {view === "advisor" && advisorTab === "settings" && <AdvisorSettings />}
        </div>
      </div>

      {showOnboarding && <OnboardingModal />}
      {showInviteClient && <InviteClientModal />}
      {showUpload && <UploadModal />}
      {showInviteContact && <InviteContactModal />}
      {showBulkInvite && <BulkInviteModal />}
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(HowdyVault));
</script>
</body>
</html>
